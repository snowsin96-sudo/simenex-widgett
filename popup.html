<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>SimeneX Pop-up</title>
  <style>
    body {
      margin: 0;
      background: rgba(0, 0, 0, 0);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #popup {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: rgba(0, 0, 0, 0.7);
      color: orange;
      padding: 10px 20px;
      border-radius: 12px;
      position: absolute;
      left: 20px;
      top: 20px;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    #icon {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: contain;
    }

    #text {
      font-size: 20px;
      font-weight: bold;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div id="popup">
  <img id="icon" src="" alt="Ikonica">
  <div id="text">Učitavanje...</div>
</div>

<script>
  const items = [
    { text: "SimeneXᵀᶦᵏᵀᵒᵏ", icon: "https://www.pngall.com/wp-content/uploads/17/Fortnite-Icon-Character-Collection-PNG.png" },
    { text: "_simenex_", icon: "https://cdn-icons-png.flaticon.com/512/2111/2111463.png" },
    { text: "sime_nex", icon: "https://cdn-icons-png.flaticon.com/512/2111/2111370.png" },
    { text: "SimeneX", icon: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png" },
  ];

  let index = 0;
  const popup = document.getElementById("popup");
  const text = document.getElementById("text");
  const icon = document.getElementById("icon");

  function showItem(i) {
    text.textContent = items[i].text;
    icon.src = items[i].icon;

    popup.style.animation = "fadeIn 2s forwards";

    setTimeout(() => {
      popup.style.animation = "fadeOut 1s forwards";
    }, 4000); // Fade out after 4 seconds
  }

  function cycleItems() {
    showItem(index);
    index = (index + 1) % items.length;
  }

  cycleItems();
  setInterval(cycleItems, 5000);
</script>

</body>
</html>
